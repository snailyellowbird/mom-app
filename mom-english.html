<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>妈妈英语外教</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#FDF6EC;--bg2:#FFF8F0;--card:#FFFFFF;--primary:#E8634A;--primary-light:#FDE8E3;--secondary:#2D9B83;--secondary-light:#E0F5F0;--accent:#F5A623;--accent-light:#FEF3DC;--text:#2D2A26;--text2:#6B6560;--muted:#A8A29E;--border:#E8DDD0;--shadow:0 2px 16px rgba(45,42,38,0.07)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow:hidden}
body::before{content:'';position:fixed;top:-120px;right:-120px;width:350px;height:350px;background:radial-gradient(circle,rgba(232,99,74,0.08) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-80px;left:-80px;width:280px;height:280px;background:radial-gradient(circle,rgba(45,155,131,0.07) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:0}
.app{max-width:480px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;position:relative;z-index:1;background:var(--bg)}
.top-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.top-nav .title-area{display:flex;align-items:center;gap:10px}
.top-nav .avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:18px;box-shadow:0 2px 8px rgba(232,99,74,0.25)}
.top-nav h1{font-size:17px;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.top-nav .sub{font-size:11px;color:var(--muted);font-weight:600}
.bottom-tabs{display:flex;background:var(--card);border-top:1px solid var(--border);padding:6px 0 env(safe-area-inset-bottom,8px);flex-shrink:0}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;border:none;background:none;color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;transition:all .2s}
.tab-btn i{font-size:20px;transition:all .2s}
.tab-btn.active{color:var(--primary)}
.tab-btn.active i{transform:scale(1.15)}
.page{flex:1;overflow:hidden;display:none;flex-direction:column}
.page.active{display:flex}

/* 对话 */
.chat-area{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
.chat-area::-webkit-scrollbar{width:3px}
.chat-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.msg-row{display:flex;gap:8px;max-width:93%;animation:msgIn .35s cubic-bezier(.16,1,.3,1)}
.msg-row.user{align-self:flex-end;flex-direction:row-reverse}
.msg-row.bot{align-self:flex-start}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900}
.msg-row.bot .msg-av{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff}
.msg-row.user .msg-av{background:var(--secondary);color:#fff}
.msg-bubble{border-radius:16px;padding:10px 13px;line-height:1.5}
.msg-row.bot .msg-bubble{background:var(--card);border:1px solid var(--border);border-top-left-radius:4px;box-shadow:var(--shadow)}
.msg-row.user .msg-bubble{background:linear-gradient(135deg,var(--secondary),#3DB896);color:#fff;border-top-right-radius:4px;box-shadow:0 2px 12px rgba(45,155,131,0.2)}
.msg-en{font-size:15px;font-weight:700}
.msg-en .wb{cursor:pointer;border-radius:4px;padding:0 2px;transition:background .15s;display:inline-block}
.msg-en .wb:hover{background:var(--primary-light)}
.msg-en .wb.active-word{background:var(--accent-light);outline:2px solid var(--accent);outline-offset:1px}
.msg-ph{font-size:12px;color:var(--muted);margin-top:3px;font-style:italic;min-height:16px}
.msg-row.user .msg-ph{color:rgba(255,255,255,0.7)}
.msg-zh{font-size:12px;color:var(--text2);margin-top:4px;padding-top:4px;border-top:1px dashed var(--border)}
.msg-row.user .msg-zh{border-top-color:rgba(255,255,255,0.25);color:rgba(255,255,255,0.85)}
.msg-acts{display:flex;gap:4px;margin-top:6px}
.ma-btn{border:none;background:none;color:var(--muted);font-size:13px;cursor:pointer;padding:3px 6px;border-radius:6px;transition:all .2s}
.ma-btn:hover{background:var(--primary-light);color:var(--primary)}
.ma-btn.speaking{color:var(--primary);animation:pulse 1s infinite}
.msg-row.user .ma-btn:hover{background:rgba(255,255,255,0.15);color:#fff}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.typing{display:flex;gap:4px;padding:10px 14px;align-self:flex-start}
.typing span{width:7px;height:7px;background:var(--muted);border-radius:50%;animation:tp 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes tp{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

.chat-input{padding:8px 12px;background:var(--card);border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
.mic-btn{width:42px;height:42px;border-radius:50%;border:none;background:var(--primary);color:#fff;font-size:17px;cursor:pointer;transition:all .2s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.mic-btn.recording{background:#EF4444;animation:micP 1.2s infinite;box-shadow:0 0 0 6px rgba(239,68,68,0.15)}
@keyframes micP{0%,100%{box-shadow:0 0 0 6px rgba(239,68,68,0.15)}50%{box-shadow:0 0 0 14px rgba(239,68,68,0.05)}}
.text-wrap{flex:1;display:flex;background:var(--bg);border-radius:20px;border:1px solid var(--border);overflow:hidden;transition:border-color .2s}
.text-wrap:focus-within{border-color:var(--primary)}
.text-wrap input{flex:1;border:none;background:transparent;padding:9px 12px;font-size:14px;font-family:inherit;outline:none;color:var(--text)}
.text-wrap input::placeholder{color:var(--muted)}
.send-btn{border:none;background:none;color:var(--primary);font-size:17px;cursor:pointer;padding:0 10px;transition:all .2s}
.send-btn:hover{transform:scale(1.1)}
.send-btn:disabled{color:var(--muted);cursor:default;transform:none}
.topic-tags{padding:6px 12px;display:flex;gap:5px;overflow-x:auto;background:var(--bg);flex-shrink:0}
.topic-tags::-webkit-scrollbar{display:none}
.topic-tag{border:1px solid var(--border);background:var(--card);padding:4px 11px;border-radius:14px;font-size:11px;font-weight:700;white-space:nowrap;cursor:pointer;transition:all .2s;color:var(--text2)}
.topic-tag:hover,.topic-tag.active{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}

/* 翻译 */
.trans-page{padding:14px;gap:10px;overflow-y:auto}
.trans-card{background:var(--card);border-radius:14px;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden}
.trans-hd{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--bg2)}
.trans-lang{font-size:12px;font-weight:800;color:var(--text2)}
.swap-btn{border:none;background:var(--primary-light);color:var(--primary);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:11px;transition:all .3s;display:flex;align-items:center;justify-content:center}
.swap-btn:hover{transform:rotate(180deg)}
.trans-bd{padding:12px;min-height:70px}
.trans-bd textarea{width:100%;border:none;background:transparent;font-size:15px;font-family:inherit;resize:none;outline:none;color:var(--text);min-height:50px}
.trans-bd textarea::placeholder{color:var(--muted)}
.trans-acts{display:flex;gap:6px;padding:8px 12px;border-top:1px solid var(--border)}
.ta-btn{border:1px solid var(--border);background:var(--bg);padding:5px 12px;border-radius:16px;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;color:var(--text2);display:flex;align-items:center;gap:4px}
.ta-btn:hover{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}
.trans-result{font-size:15px;font-weight:700;line-height:1.6}
.trans-result .wb{cursor:pointer;border-radius:4px;padding:0 2px;transition:background .15s;display:inline-block}
.trans-result .wb:hover{background:var(--primary-light)}
.trans-ph{font-size:13px;color:var(--muted);font-style:italic;margin-top:4px;min-height:18px}
.quick-phrases{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.qp-btn{border:1px solid var(--border);background:var(--card);padding:4px 10px;border-radius:12px;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;color:var(--text2)}
.qp-btn:hover{background:var(--secondary-light);border-color:var(--secondary);color:var(--secondary)}

/* 跟练 */
.prac-page{padding:14px;gap:14px;overflow-y:auto}
.scene-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.scene-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;transition:all .25s;text-align:center}
.scene-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(45,42,38,0.08);border-color:var(--primary)}
.scene-card .sc-icon{width:40px;height:40px;border-radius:12px;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff}
.scene-card h3{font-size:13px;font-weight:800}
.scene-card p{font-size:11px;color:var(--muted);margin-top:2px}
.prac-list{display:flex;flex-direction:column;gap:8px}
.prac-line{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:11px 12px;transition:all .2s}
.prac-line.active-line{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
.pl-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.pl-label{font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px}
.pl-label.teacher{background:var(--primary-light);color:var(--primary)}
.pl-label.you{background:var(--secondary-light);color:var(--secondary)}
.pl-en{font-size:14px;font-weight:700}
.pl-en .wb{cursor:pointer;border-radius:4px;padding:0 2px;transition:background .15s;display:inline-block}
.pl-en .wb:hover{background:var(--primary-light)}
.pl-ph{font-size:11px;color:var(--muted);font-style:italic;margin-top:1px;min-height:14px}
.pl-zh{font-size:11px;color:var(--text2);margin-top:1px}
.pl-btns{display:flex;gap:5px;margin-top:6px}
.pl-btn{border:1px solid var(--border);background:var(--bg);padding:4px 10px;border-radius:14px;font-size:10px;font-weight:700;cursor:pointer;transition:all .2s;color:var(--text2);display:flex;align-items:center;gap:3px}
.pl-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.pl-btn.rec-line{border-color:#EF4444;color:#EF4444;background:#FEF2F2;animation:micP 1.2s infinite}
.score-bar{margin-top:6px;display:flex;align-items:center;gap:6px}
.score-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.score-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.16,1,.3,1);width:0}
.score-fill.great{background:var(--secondary)}.score-fill.good{background:var(--accent)}.score-fill.try{background:var(--primary)}
.score-text{font-size:10px;font-weight:800;white-space:nowrap}

/* 提示词气泡 */
.word-tip{position:fixed;background:var(--text);color:#fff;padding:6px 12px;border-radius:10px;font-size:13px;font-weight:700;pointer-events:none;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,0.2);opacity:0;transition:opacity .2s;white-space:nowrap}
.word-tip.show{opacity:1}

.toast-box{position:fixed;top:56px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:6px;align-items:center}
.toast{background:var(--text);color:#fff;padding:8px 18px;border-radius:10px;font-size:12px;font-weight:700;box-shadow:0 4px 20px rgba(0,0,0,0.15);animation:tIn .3s ease,tOut .3s ease 2s forwards}
@keyframes tIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes tOut{from{opacity:1}to{opacity:0;transform:translateY(-8px)}}

.hide-scroll::-webkit-scrollbar{display:none}
.hide-scroll{-ms-overflow-style:none;scrollbar-width:none}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>

<div class="app" id="app">
  <nav class="top-nav">
    <div class="title-area">
      <div class="avatar">E</div>
      <div>
        <h1>English Tutor</h1>
        <div class="sub">妈妈的专属英语外教</div>
      </div>
    </div>
  </nav>

  <!-- 对话页 -->
  <div class="page active" id="page-chat">
    <div class="topic-tags hide-scroll" id="topicTags"></div>
    <div class="chat-area" id="chatArea"></div>
    <div class="chat-input">
      <button class="mic-btn" id="micBtn" onclick="toggleRecording()" aria-label="语音输入"><i class="fas fa-microphone"></i></button>
      <div class="text-wrap">
        <input type="text" id="chatInput" placeholder="输入英语或中文..." autocomplete="off">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled aria-label="发送"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>

  <!-- 翻译页 -->
  <div class="page trans-page" id="page-translate">
    <div style="font-size:18px;font-weight:900;margin-bottom:2px;">翻译助手</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">输入中文或英文，点击单词查看音标</div>
    <div class="trans-card">
      <div class="trans-hd">
        <span class="trans-lang" id="srcLang">中文</span>
        <button class="swap-btn" onclick="swapDir()" aria-label="切换方向"><i class="fas fa-exchange-alt"></i></button>
        <span class="trans-lang" id="tgtLang">English</span>
      </div>
      <div class="trans-bd"><textarea id="transInput" placeholder="输入要翻译的内容..." rows="2"></textarea></div>
      <div class="trans-acts">
        <button class="ta-btn" onclick="doTranslate()"><i class="fas fa-language"></i> 翻译</button>
        <button class="ta-btn" onclick="speakTrans('src')"><i class="fas fa-volume-up"></i> 朗读原文</button>
      </div>
    </div>
    <div class="trans-card" id="transResultCard" style="display:none">
      <div class="trans-hd"><span class="trans-lang">翻译结果（点击单词查音标）</span></div>
      <div class="trans-bd">
        <div class="trans-result" id="transResult"></div>
        <div class="trans-ph" id="transPhonetic"></div>
      </div>
      <div class="trans-acts">
        <button class="ta-btn" onclick="speakTrans('tgt')"><i class="fas fa-volume-up"></i> 朗读译文</button>
        <button class="ta-btn" onclick="copyTrans()"><i class="fas fa-copy"></i> 复制</button>
      </div>
    </div>
    <div style="font-size:13px;font-weight:800;margin-top:6px;">常用短语</div>
    <div class="quick-phrases" id="quickPhrases"></div>
  </div>

  <!-- 跟练页 -->
  <div class="page prac-page" id="page-practice">
    <div style="font-size:18px;font-weight:900;margin-bottom:2px;">口语跟练</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">选择场景，逐句跟读练习发音</div>
    <div class="scene-grid" id="sceneCards"></div>
    <div id="pracContent" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px;">
        <div style="font-size:15px;font-weight:800;" id="pracTitle"></div>
        <button style="border:1px solid var(--border);background:var(--bg);padding:4px 10px;border-radius:14px;font-size:11px;font-weight:700;cursor:pointer;color:var(--text2);" onclick="closePrac()"><i class="fas fa-times"></i> 返回</button>
      </div>
      <div class="prac-list" id="pracList"></div>
      <div style="text-align:center;margin-top:10px;">
        <button style="border:none;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;padding:10px 28px;border-radius:22px;font-size:13px;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(232,99,74,0.25);" onclick="autoPlayPrac()"><i class="fas fa-play"></i> 自动播放跟练</button>
      </div>
    </div>
  </div>

  <div class="bottom-tabs">
    <button class="tab-btn active" onclick="switchTab('chat')" data-tab="chat"><i class="fas fa-comments"></i><span>口语对话</span></button>
    <button class="tab-btn" onclick="switchTab('translate')" data-tab="translate"><i class="fas fa-language"></i><span>翻译</span></button>
    <button class="tab-btn" onclick="switchTab('practice')" data-tab="practice"><i class="fas fa-microphone-alt"></i><span>跟练</span></button>
  </div>
</div>

<div class="word-tip" id="wordTip"></div>
<div class="toast-box" id="toastBox"></div>

<script>
// ========== 完整音标词典 ==========
// 覆盖所有对话、翻译、跟练中出现的词汇，最长词组优先匹配
const DICT = {
  // --- 词组（优先匹配）---
  "nice to meet you":"/naɪs tə miːt juː/","how are you":"/haʊ ɑːr juː/","how much":"/haʊ mʌtʃ/",
  "how do you":"/haʊ duː juː/","see you later":"/siː juː ˈleɪtər/","see you tomorrow":"/siː juː təˈmɔːroʊ/",
  "take it easy":"/teɪk ɪt ˈiːzi/","let me see":"/let miː siː/","excuse me":"/ɪkˈskjuːz miː/",
  "thank you":"/θæŋk juː/","no problem":"/noʊ ˈprɑːbləm/","of course":"/əv kɔːrs/",
  "good morning":"/ɡʊd ˈmɔːrnɪŋ/","good afternoon":"/ɡʊd ˌæftərˈnuːn/","good evening":"/ɡʊd ˈiːvnɪŋ/",
  "good night":"/ɡʊd naɪt/","goodbye":"/ɡʊdˈbaɪ/","good luck":"/ɡʊd lʌk/","good job":"/ɡʊd dʒɑːb/",
  "would you like":"/wʊd juː laɪk/","do you want":"/duː juː wɑːnt/","what would you":"/wʌt wʊd juː/",
  "i would like":"/aɪ wʊd laɪk/","i want to":"/aɪ wɑːnt tuː/","i need to":"/aɪ niːd tuː/",
  "i have to":"/aɪ hæv tuː/","i am going to":"/aɪ æm ˈɡoʊɪŋ tuː/","i am sorry":"/aɪ æm ˈsɑːri/",
  "i think that":"/aɪ θɪŋk ðæt/","i hope you":"/aɪ hoʊp juː/","i don't know":"/aɪ doʊnt noʊ/",
  "i don't understand":"/aɪ doʊnt ˌʌndərˈstænd/","please say it again":"/pliːz seɪ ɪt əˈɡen/",
  "please speak slowly":"/pliːz spiːk ˈsloʊli/","what is your name":"/wʌt ɪz jɔːr neɪm/",
  "my name is":"/maɪ neɪm ɪz/","how is the weather":"/haʊ ɪz ðə ˈweðər/",
  "what time is it":"/wʌt taɪm ɪz ɪt/","where is the":"/wer ɪz ðə/",
  "on sale":"/ɑːn seɪl/","by cash":"/baɪ kæʃ/","credit card":"/ˈkredɪt kɑːrd/",
  "feel free":"/fiːl friː/","look around":"/lʊk əˈraʊnd/","help yourself":"/help jɔːrˈself/",
  "take your time":"/teɪk jɔːr taɪm/","have a good day":"/hæv ə ɡʊd deɪ/",
  "very much":"/ˈveri mʌtʃ/","a little":"/ə ˈlɪtl/","a lot":"/ə lɑːt/",
  "each other":"/iːtʃ ˈʌðər/","one more time":"/wʌn mɔːr taɪm/",
  "sweet dreams":"/swiːt driːmz/","take care":"/teɪk ker/",

  // --- 单词 A-Z ---
  "a":"/ə/","an":"/ən/","about":"/əˈbaʊt/","above":"/əˈbʌv/","abroad":"/əˈbrɔːd/",

// ========== 音标引擎：最长词组优先匹配 ==========
function getPhonetic(text) {
  if (!text) return '';
  const cleaned = text.toLowerCase().replace(/[.,!?;:'"()\[\]{}]/g, '').trim();
  if (!cleaned) return '';
  const words = cleaned.split(/\s+/);
  const result = [];
  let i = 0;
  while (i < words.length) {
    let matched = false;
    // 从最长词组开始尝试匹配
    for (let len = Math.min(5, words.length - i); len >= 1; len--) {
      const phrase = words.slice(i, i + len).join(' ');
      if (DICT[phrase]) {
        result.push(DICT[phrase].replace(/^\//, '').replace(/\/$/, ''));
        i += len;
        matched = true;
        break;
      }
    }
    if (!matched) {
      // 未收录的词，用空格占位
      result.push('____');
      i++;
    }
  }
  return '/' + result.join(' ') + '/';
}

// 获取单个词的音标
function getWordPhonetic(word) {
  const w = word.toLowerCase().replace(/[.,!?;:'"()\[\]{}]/g, '');
  return DICT[w] || '';
}

// ========== 状态 ==========
let currentTopic = 'daily';
let isRecording = false;
let recognition = null;
let speakingWord = null;
let transDir = 'zh2en'; // zh2en 或 en2zh
let currentSpeakingEl = null;

// ========== 初始化 ==========
document.addEventListener('DOMContentLoaded', () => {
  initTopicTags();
  initQuickPhrases();
  initSceneCards();
  initSpeechRecognition();
  initChatInput();

// 话题标签
function initTopicTags() {
  const container = document.getElementById('topicTags');
  TOPICS.forEach(t => {
    const tag = document.createElement('div');
    tag.className = 'topic-tag' + (t.id === currentTopic ? ' active' : '');
    tag.innerHTML = `<i class="fas ${t.icon}"></i> ${t.name}`;
    tag.onclick = () => switchTopic(t.id);
    container.appendChild(tag);
  });
}

function switchTopic(id) {
  currentTopic = id;
  document.querySelectorAll('.topic-tag').forEach((el, i) => {
    el.classList.toggle('active', TOPICS[i].id === id);
  });
  const scene = SCENES[id];
  addBotMessage(scene.opening.en, scene.opening.zh);
  toast(`已切换到「${TOPICS.find(t=>t.id===id).name}」话题`);
}

// 快速短语
function initQuickPhrases() {
  const container = document.getElementById('quickPhrases');
  QUICK_PHRASES.forEach(p => {
    const btn = document.createElement('div');
    btn.className = 'qp-btn';
    btn.textContent = p.zh;

}

// 跟练场景卡

// ========== 语音识别 ==========
function initSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    console.log('SpeechRecognition not supported');
    return;
  }
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.continuous = false;

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    stopRecording();
    processUserInput(text);
  };
  recognition.onerror = () => { stopRecording(); };
  recognition.onend = () => { stopRecording(); };
}

function toggleRecording() {
  if (!recognition) {
    toast('您的浏览器不支持语音识别，请使用Chrome浏览器');
    return;
  }
  if (isRecording) {
    recognition.stop();
    stopRecording();
  } else {
    try {
      recognition.lang = 'en-US';
      recognition.start();
      isRecording = true;
      document.getElementById('micBtn').classList.add('recording');
      toast('请说英语...');
    } catch(e) {
      stopRecording();
    }
  }
}

function stopRecording() {
  isRecording = false;
  document.getElementById('micBtn').classList.remove('recording');
}

// ========== 输入框 ==========
function initChatInput() {
  const input = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  input.addEventListener('input', () => {
    sendBtn.disabled = !input.value.trim();
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && input.value.trim()) {
      sendMessage();
    }
  });
}

function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  processUserInput(text);
}

// ========== 对话逻辑 ==========
function processUserInput(text) {
  // 判断中英文
  const isChinese = /[\u4e00-\u9fff]/.test(text);
  let englishText = text;
  let chineseText = '';

  if (isChinese) {
    chineseText = text;
    englishText = translateZhToEn(text);
  } else {
    englishText = text;
    chineseText = translateEnToZh(text);
  }

  addUserMessage(englishText, chineseText);

  // 获取AI回复
  setTimeout(() => {
    const reply = getAIReply(text, isChinese);
    addBotMessage(reply.en, reply.zh);
  }, 800 + Math.random() * 600);
}

function translateZhToEn(zh) {
  // 尝试精确匹配
  if (ZH_EN[zh]) return ZH_EN[zh];
  // 尝试模糊匹配
  for (const [key, val] of Object.entries(ZH_EN)) {
    if (zh.includes(key)) return val;
  }
  return zh;
}

function translateEnToZh(en) {
  // 简单英文转中文提示
  const lower = en.toLowerCase();
  if (lower.includes('hello') || lower.includes('hi')) return '你好';
  if (lower.includes('thank')) return '谢谢';
  if (lower.includes('sorry')) return '对不起';
  if (lower.includes('how are you')) return '你好吗';
  if (lower.includes('good morning')) return '早上好';
  if (lower.includes('good night')) return '晚安';
  if (lower.includes('love')) return '爱';
  if (lower.includes('happy')) return '开心';
  if (lower.includes('name')) return '名字';
  if (lower.includes('weather')) return '天气';
  if (lower.includes('food') || lower.includes('eat')) return '食物/吃';
  if (lower.includes('buy') || lower.includes('shop')) return '买/购物';
  return '';
}

function getAIReply(text, isChinese) {
  const scene = SCENES[currentTopic];
  if (!scene) return { en:"I'm here! What would you like to talk about?", zh:"我在呢！你想聊什么？" };

  const lower = text.toLowerCase();
  // 关键词匹配
  for (const r of scene.responses) {
    for (const kw of r.kw) {
      if (lower.includes(kw.toLowerCase())) {
        return r.reply;
      }
    }
  }
  // 默认回复
  const fb = scene.fallback[Math.floor(Math.random() * scene.fallback.length)];
  return fb;
}

// ========== 消息渲染 ==========
function addBotMessage(en, zh) {
  const chatArea = document.getElementById('chatArea');
  const ph = getPhonetic(en);
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.innerHTML = `
    <div class="msg-av">E</div>
    <div class="msg-bubble">
      <div class="msg-en">${renderWords(en)}</div>
      <div class="msg-ph">${ph}</div>
      <div class="msg-zh">${zh}</div>
      <div class="msg-acts">
        <button class="ma-btn" onclick="speakSentence(this,'${esc(en)}')" title="朗读"><i class="fas fa-volume-up"></i></button>
        <button class="ma-btn" onclick="speakSlow(this,'${esc(en)}')" title="慢速朗读"><i class="fas fa-turtle">0.6x</i></button>
      </div>
    </div>
  `;
  chatArea.appendChild(row);
  chatArea.scrollTop = chatArea.scrollHeight;

  // 给每个词绑定点击事件
  bindWordClicks(row);
}

function addUserMessage(en, zh) {

  row.innerHTML = `

    <div class="msg-bubble">
      <div class="msg-en">${renderWords(en)}</div>
      <div class="msg-ph">${ph}</div>
      ${zh ? `<div class="msg-zh">${zh}</div>` : ''}
      <div class="msg-acts">
        <button class="ma-btn" onclick="speakSentence(this,'${esc(en)}')" title="朗读"><i class="fas fa-volume-up"></i></button>
        <button class="ma-btn" onclick="speakSlow(this,'${esc(en)}')" title="慢速朗读"><i class="fas fa-turtle">0.6x</i></button>
      </div>
    </div>
  `;
  chatArea.appendChild(row);
  chatArea.scrollTop = chatArea.scrollHeight;
  bindWordClicks(row);
}

// 渲染可点击的单词
function renderWords(text) {
  return text.split(/\s+/).map(w => {
    const clean = w.replace(/[.,!?;:'"()\[\]{}]/g, '');
    return `<span class="wb" data-word="${clean}">${w}</span>`;
  }).join(' ');
}

function esc(s) { return s.replace(/'/g, "\\'"); }

// 绑定单词点击
function bindWordClicks(container) {
  container.querySelectorAll('.wb').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const word = el.dataset.word.toLowerCase();
      const ph = getWordPhonetic(word);
      showWordTip(el, word, ph);
      // 朗读该词
      speakWord(word);
      // 高亮
      container.querySelectorAll('.wb').forEach(w => w.classList.remove('active-word'));
      el.classList.add('active-word');
      setTimeout(() => el.classList.remove('active-word'), 1500);
    });
  });
}

// 单词提示气泡
function showWordTip(el, word, ph) {
  const tip = document.getElementById('wordTip');
  tip.innerHTML = `<strong>${word}</strong> ${ph || '(点击朗读)'}`;
  const rect = el.getBoundingClientRect();
  tip.style.left = Math.max(8, Math.min(rect.left, window.innerWidth - 200)) + 'px';
  tip.style.top = (rect.top - 40) + 'px';
  tip.classList.add('show');
  clearTimeout(tip._timer);
  tip._timer = setTimeout(() => tip.classList.remove('show'), 2500);
}

// ========== 朗读功能 ==========
function speakWord(word) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US';
  u.rate = 0.8;
  window.speechSynthesis.speak(u);
}

function speakSentence(btn, text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.9;
  // 按钮动画
  if (btn) btn.classList.add('speaking');
  u.onend = () => { if (btn) btn.classList.remove('speaking'); };
  window.speechSynthesis.speak(u);
}

function speakSlow(btn, text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.55;
  if (btn) btn.classList.add('speaking');
  u.onend = () => { if (btn) btn.classList.remove('speaking'); };
  window.speechSynthesis.speak(u);
}

// ========== 翻译功能 ==========
function swapDir() {
  transDir = transDir === 'zh2en' ? 'en2zh' : 'zh2en';
  document.getElementById('srcLang').textContent = transDir === 'zh2en' ? '中文' : 'English';
  document.getElementById('tgtLang').textContent = transDir === 'zh2en' ? 'English' : '中文';
  document.getElementById('transInput').placeholder = transDir === 'zh2en' ? '输入中文...' : '输入英文...';
}

function doTranslate() {
  const input = document.getElementById('transInput').value.trim();
  if (!input) return;

  const resultCard = document.getElementById('transResultCard');
  const resultEl = document.getElementById('transResult');
  const phEl = document.getElementById('transPhonetic');

  let resultText = '';
  let phonetic = '';

  if (transDir === 'zh2en') {
    resultText = translateZhToEn(input);
    // 如果找不到，提示
    if (resultText === input) {
      resultText = input;
      phonetic = '暂未收录该翻译，请尝试更常见的词语';
    } else {
      phonetic = getPhonetic(resultText);
    }
  } else {
    resultText = translateEnToZh(input) || input;
    phonetic = getPhonetic(input);
  }

  resultEl.innerHTML = transDir === 'en2zh' ? resultText : renderWords(resultText);
  phEl.textContent = phonetic;

  resultCard.style.display = 'block';

  // 绑定词点击
  if (transDir === 'zh2en') {
    bindWordClicks(resultCard);
  }
}

function speakTrans(which) {
  const input = document.getElementById('transInput').value.trim();
  const resultEl = document.getElementById('transResult');
  if (!input) return;

  if (which === 'src') {
    const lang = transDir === 'zh2en' ? 'zh-CN' : 'en-US';
    const u = new SpeechSynthesisUtterance(input);
    u.lang = lang;
    u.rate = 0.85;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  } else {
    const text = resultEl.textContent;
    const lang = transDir === 'zh2en' ? 'en-US' : 'zh-CN';
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = 0.85;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  }
}

function copyTrans() {
  const text = document.getElementById('transResult').textContent;
  navigator.clipboard.writeText(text).then(() => toast('已复制'));
}

// ========== 跟练功能 ==========
function openPractice(key) {
  const data = PRACTICE_DATA[key];
  document.getElementById('sceneCards').style.display = 'none';
  document.getElementById('pracContent').style.display = 'block';
  document.getElementById('pracTitle').textContent = data.title;

  const list = document.getElementById('pracList');
  list.innerHTML = '';

  data.lines.forEach((line, idx) => {
    const ph = getPhonetic(line.en);
    const div = document.createElement('div');
    div.className = 'prac-line';
    div.id = 'pline-' + idx;
    div.innerHTML = `
      <div class="pl-top">
        <span class="pl-label ${line.role === 'teacher' ? 'teacher' : 'you'}">${line.role === 'teacher' ? '外教' : '你'}</span>
        <span style="font-size:10px;color:var(--muted)">#${idx + 1}</span>
      </div>
      <div class="pl-en">${renderWords(line.en)}</div>
      <div class="pl-ph">${ph}</div>
      <div class="pl-zh">${line.zh}</div>
      <div class="pl-btns">
        <button class="pl-btn" onclick="speakLine(${idx})"><i class="fas fa-volume-up"></i> 朗读</button>
        <button class="pl-btn" onclick="speakLineSlow(${idx})"><i class="fas fa-clock"></i> 慢速</button>
        <button class="pl-btn" id="recLine-${idx}" onclick="toggleLineRec(${idx})"><i class="fas fa-microphone"></i> 跟读</button>
      </div>
      <div class="score-bar" id="score-${idx}" style="display:none">
        <div class="score-track"><div class="score-fill" id="scoreFill-${idx}"></div></div>
        <span class="score-text" id="scoreText-${idx}"></span>
      </div>
    `;
    list.appendChild(div);
    bindWordClicks(div);
  });
}

function closePrac() {
  document.getElementById('sceneCards').style.display = 'grid';
  document.getElementById('pracContent').style.display = 'none';
}

function getLineEn(idx) {
  // 从当前场景获取句子
  const activeScene = document.getElementById('pracTitle').textContent;
  let data = null;
  for (const key of Object.keys(PRACTICE_DATA)) {
    if (PRACTICE_DATA[key].title === activeScene) { data = PRACTICE_DATA[key]; break; }
  }
  return data ? data.lines[idx].en : '';
}

function speakLine(idx) {
  const en = getLineEn(idx);
  if (!en || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(en);
  u.lang = 'en-US';
  u.rate = 0.85;
  highlightLine(idx);
  u.onend = () => unhighlightLine(idx);
  window.speechSynthesis.speak(u);
}

function speakLineSlow(idx) {
  const en = getLineEn(idx);
  if (!en || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(en);
  u.lang = 'en-US';
  u.rate = 0.5;
  highlightLine(idx);
  u.onend = () => unhighlightLine(idx);
  window.speechSynthesis.speak(u);
}

function highlightLine(idx) {
  document.getElementById('pline-' + idx)?.classList.add('active-line');
}
function unhighlightLine(idx) {
  document.getElementById('pline-' + idx)?.classList.remove('active-line');
}

// 跟读录音
let lineRecognition = null;
let currentRecLine = -1;

function toggleLineRec(idx) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('浏览器不支持语音识别，请使用Chrome'); return; }

  const btn = document.getElementById('recLine-' + idx);
  if (currentRecLine === idx) {
    // 停止
    if (lineRecognition) lineRecognition.stop();
    btn.classList.remove('rec-line');
    btn.innerHTML = '<i class="fas fa-microphone"></i> 跟读';
    currentRecLine = -1;
    return;
  }

  // 停止之前的
  if (currentRecLine >= 0) {
    const prevBtn = document.getElementById('recLine-' + currentRecLine);
    if (prevBtn) { prevBtn.classList.remove('rec-line'); prevBtn.innerHTML = '<i class="fas fa-microphone"></i> 跟读'; }
    if (lineRecognition) lineRecognition.stop();
  }

  currentRecLine = idx;
  btn.classList.add('rec-line');
  btn.innerHTML = '<i class="fas fa-stop"></i> 停止';

  lineRecognition = new SR();
  lineRecognition.lang = 'en-US';
  lineRecognition.interimResults = false;
  lineRecognition.continuous = false;

  lineRecognition.onresult = (e) => {
    const spoken = e.results[0][0].transcript;
    const original = getLineEn(idx);
    const score = calcScore(spoken, original);
    showScore(idx, score);
    btn.classList.remove('rec-line');
    btn.innerHTML = '<i class="fas fa-microphone"></i> 跟读';
    currentRecLine = -1;
  };

  lineRecognition.onerror = () => {
    btn.classList.remove('rec-line');
    btn.innerHTML = '<i class="fas fa-microphone"></i> 跟读';
    currentRecLine = -1;
    toast('识别失败，请再试一次');
  };

  lineRecognition.onend = () => {
    btn.classList.remove('rec-line');
    btn.innerHTML = '<i class="fas fa-microphone"></i> 跟读';
  };

  try { lineRecognition.start(); toast('请跟读这句英语...'); }
  catch(e) { btn.classList.remove('rec-line'); btn.innerHTML = '<i class="fas fa-microphone"></i> 跟读'; currentRecLine = -1; }
}

// 评分算法
function calcScore(spoken, original) {
  const a = spoken.toLowerCase().replace(/[.,!?;:'"()]/g, '').split(/\s+/);
  const b = original.toLowerCase().replace(/[.,!?;:'"()]/g, '').split(/\s+/);
  if (!a.length || !b.length) return 0;
  let matches = 0;
  const bCopy = [...b];
  for (const w of a) {
    const idx = bCopy.indexOf(w);
    if (idx !== -1) { matches++; bCopy.splice(idx, 1); }
  }
  return Math.round((matches / b.length) * 100);
}

function showScore(idx, score) {
  const bar = document.getElementById('score-' + idx);
  const fill = document.getElementById('scoreFill-' + idx);
  const text = document.getElementById('scoreText-' + idx);
  bar.style.display = 'flex';
  fill.style.width = '0%';

  let level, label;
  if (score >= 80) { level = 'great'; label = `${score}% 发音很棒!`; }
  else if (score >= 50) { level = 'good'; label = `${score}% 不错，继续加油!`; }
  else { level = 'try'; label = `${score}% 再试一次吧!`; }

  fill.className = 'score-fill ' + level;
  text.textContent = label;
  text.style.color = level === 'great' ? 'var(--secondary)' : level === 'good' ? 'var(--accent)' : 'var(--primary)';

  setTimeout(() => { fill.style.width = score + '%'; }, 50);
}

// 自动播放跟练
async function autoPlayPrac() {
  const activeScene = document.getElementById('pracTitle').textContent;
  let data = null;
  for (const key of Object.keys(PRACTICE_DATA)) {
    if (PRACTICE_DATA[key].title === activeScene) { data = PRACTICE_DATA[key]; break; }
  }
  if (!data) return;

  toast('自动跟练开始，请仔细听外教朗读');

  for (let i = 0; i < data.lines.length; i++) {
    highlightLine(i);
    const en = data.lines[i].en;

    // 先正常朗读
    await new Promise(resolve => {
      const u = new SpeechSynthesisUtterance(en);
      u.lang = 'en-US';
      u.rate = 0.8;
      u.onend = resolve;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
    });

    await sleep(500);

    // 如果是"你"的台词，等用户跟读
    if (data.lines[i].role === 'you') {
      toast('现在轮到你跟读了！');
      await sleep(2500);
    }

    unhighlightLine(i);
    await sleep(300);
  }

  toast('跟练完成！你做得很棒！');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ========== 页面切换 ==========
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab)?.classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
}

// ========== Toast ==========
function toast(msg) {
  const box = document.getElementById('toastBox');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  box.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}

// 点击空白关闭词提示
document.addEventListener('click', () => {
  document.getElementById('wordTip').classList.remove('show');
});
</script>
